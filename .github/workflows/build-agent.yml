name: Build Agent (Apple Silicon)

on:
  workflow_dispatch:
    inputs:
      upload_to_b2:
        description: 'Upload DMG to Backblaze B2'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Verify architecture
        run: |
          echo "Python: $(python3 --version)"
          python3 -c "import platform; print(f'Architecture: {platform.machine()}')"
          python3 -c "import struct; print(f'Pointer size: {struct.calcsize(\"P\") * 8}-bit')"
          # Fail if not arm64
          python3 -c "import platform; assert platform.machine() == 'arm64', f'Expected arm64, got {platform.machine()}'"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        working-directory: agent
        run: poetry install

      - name: Extract version
        id: version
        working-directory: agent
        run: |
          VERSION=$(grep '__version__' app/__version__.py | sed 's/__version__ = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Agent version: $VERSION"

      - name: Convert icon
        working-directory: agent
        run: |
          mkdir -p build/icon.iconset
          for size in 16 32 128 256 512; do
            sips -z $size $size resources/icon.png \
              --out build/icon.iconset/icon_${size}x${size}.png > /dev/null 2>&1
            size2x=$((size * 2))
            sips -z $size2x $size2x resources/icon.png \
              --out build/icon.iconset/icon_${size}x${size}@2x.png > /dev/null 2>&1
          done
          iconutil -c icns build/icon.iconset -o build/icon.icns
          rm -rf build/icon.iconset

      - name: Build with PyInstaller
        working-directory: agent
        run: |
          poetry run pyinstaller --clean --noconfirm rmirror.spec 2>&1 | grep -v "^[0-9]* INFO:" || true
          if [ ! -d "dist/rMirror.app" ]; then
            echo "PyInstaller failed to create app bundle"
            exit 1
          fi
          echo "App bundle created"
          file dist/rMirror.app/Contents/MacOS/rMirror

      - name: Import signing certificate
        env:
          CODESIGN_CERTIFICATE_P12: ${{ secrets.CODESIGN_CERTIFICATE_P12 }}
          CODESIGN_PASSWORD: ${{ secrets.CODESIGN_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$CODESIGN_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CODESIGN_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm "$RUNNER_TEMP/certificate.p12"

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Find the signing identity
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Found identity: $IDENTITY"
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Codesign app bundle
        working-directory: agent
        run: |
          echo "Stripping existing signatures..."
          find dist/rMirror.app -type f \( -name "*.so" -o -name "*.dylib" \) \
            -exec codesign --remove-signature {} \; 2>/dev/null || true

          echo "Signing with: $CODESIGN_IDENTITY"
          codesign --force --deep --sign "$CODESIGN_IDENTITY" \
            --options runtime \
            --timestamp \
            dist/rMirror.app

          echo "Verifying signature..."
          codesign --verify --deep --strict --verbose=2 dist/rMirror.app

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        working-directory: agent
        env:
          AGENT_VERSION: ${{ steps.version.outputs.version }}
        run: |
          DMG_NAME="rMirror-${AGENT_VERSION}.dmg"

          create-dmg \
            --volname "rMirror Installer" \
            --volicon "build/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "rMirror.app" 150 190 \
            --hide-extension "rMirror.app" \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "dist/$DMG_NAME" \
            dist/rMirror.app 2>&1 | grep -v "^hdiutil:" || true

          if [ ! -f "dist/$DMG_NAME" ]; then
            echo "Failed to create DMG"
            exit 1
          fi

          codesign --sign "$CODESIGN_IDENTITY" "dist/$DMG_NAME"
          echo "DMG created and signed: $DMG_NAME"

      - name: Notarize DMG
        working-directory: agent
        env:
          NOTARIZE_APPLE_ID: ${{ secrets.NOTARIZE_APPLE_ID }}
          NOTARIZE_TEAM_ID: ${{ secrets.NOTARIZE_TEAM_ID }}
          NOTARIZE_PASSWORD: ${{ secrets.NOTARIZE_PASSWORD }}
          AGENT_VERSION: ${{ steps.version.outputs.version }}
        run: |
          DMG_PATH="dist/rMirror-${AGENT_VERSION}.dmg"

          echo "Submitting for notarization..."
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$NOTARIZE_APPLE_ID" \
            --team-id "$NOTARIZE_TEAM_ID" \
            --password "$NOTARIZE_PASSWORD" \
            --wait

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$DMG_PATH"

          echo "Verifying..."
          xcrun stapler validate "$DMG_PATH"
          codesign --verify --verbose=2 "$DMG_PATH"

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: rMirror-${{ steps.version.outputs.version }}
          path: agent/dist/rMirror-${{ steps.version.outputs.version }}.dmg

      - name: Upload to Backblaze B2
        if: ${{ inputs.upload_to_b2 }}
        working-directory: agent
        env:
          B2_APPLICATION_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          AGENT_VERSION: ${{ steps.version.outputs.version }}
        run: |
          pip install b2
          DMG_PATH="dist/rMirror-${AGENT_VERSION}.dmg"
          B2_PATH="releases/v${AGENT_VERSION}/rMirror-${AGENT_VERSION}.dmg"

          b2 account authorize "$B2_APPLICATION_KEY_ID" "$B2_APPLICATION_KEY"
          b2 file upload rmirror-downloads "$DMG_PATH" "$B2_PATH"

          echo "Download URL: https://f000.backblazeb2.com/file/rmirror-downloads/$B2_PATH"

      - name: Build summary
        working-directory: agent
        env:
          AGENT_VERSION: ${{ steps.version.outputs.version }}
        run: |
          DMG_PATH="dist/rMirror-${AGENT_VERSION}.dmg"
          DMG_SIZE=$(du -h "$DMG_PATH" | cut -f1)
          DMG_SHA256=$(shasum -a 256 "$DMG_PATH" | cut -d' ' -f1)

          echo "## Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${AGENT_VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Architecture:** arm64 (Apple Silicon)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Size:** ${DMG_SIZE}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **SHA256:** \`${DMG_SHA256}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
