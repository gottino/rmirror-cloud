<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rMirror Agent Authentication</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 48px; margin-bottom: 10px; }
        h1 { font-size: 2em; margin-bottom: 10px; color: #1d1d1f; }
        .subtitle { color: #86868b; font-size: 1em; margin-bottom: 20px; }
        .info-box {
            background: #f5f5f7;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .info-box p { color: #1d1d1f; line-height: 1.6; margin-bottom: 10px; }
        .info-box p:last-child { margin-bottom: 0; }
        .info-box strong { color: #667eea; }
        .status-box {
            background: #f5f5f7;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }
        .status-box p { color: #86868b; }
        .error-box {
            background: #fdeaea;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }
        .error-box p { color: #c0392b; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            margin-top: 12px;
        }
        button:hover { background: #5568d3; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">&#x1F4D3;</div>
            <h1>rMirror Agent</h1>
            <p class="subtitle">Authentication Required</p>
        </div>

        <div class="info-box">
            <p>To sync your reMarkable notebooks to the cloud, you need to sign in with your rMirror account.</p>
            <p><strong>This page will automatically communicate with your local rMirror Agent.</strong></p>
        </div>

        <!-- Clerk mounts sign-in here -->
        <div id="clerk-signin"></div>

        <!-- Shown after sign-in completes -->
        <div id="post-signin" style="display: none;">
            <div class="status-box">
                <p id="status-text">Exchanging token...</p>
            </div>
            <div class="error-box" id="error-box">
                <p id="error-text"></p>
            </div>
            <button id="retry-btn" style="display: none;" onclick="exchangeToken()">Retry</button>
        </div>
    </div>

    <script>
        var API_URL = '{{ api_url }}';
        var CLERK_KEY = '{{ clerk_publishable_key }}';
        var CALLBACK_URL = window.location.origin + '/auth/callback';

        // Determine Clerk SDK URL based on key type
        // Dev/test keys: load from instance CDN (needed for UI components)
        // Live keys: load from jsdelivr (production Clerk proxy doesn't serve SDK)
        var sdkUrl;
        if (CLERK_KEY.startsWith('pk_test_')) {
            var domain = atob(CLERK_KEY.slice('pk_test_'.length));
            if (domain.endsWith('$')) domain = domain.slice(0, -1);
            sdkUrl = 'https://' + domain + '/npm/@clerk/clerk-js@latest/dist/clerk.browser.js';
        } else {
            sdkUrl = 'https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js';
        }

        // Load Clerk SDK
        var script = document.createElement('script');
        script.src = sdkUrl;
        script.setAttribute('data-clerk-publishable-key', CLERK_KEY);
        script.setAttribute('crossorigin', 'anonymous');
        script.onload = function() {
            window.Clerk.load().then(initClerk);
        };
        document.head.appendChild(script);

        function initClerk() {
            var clerk = window.Clerk;

            if (clerk.user) {
                // Already signed in — exchange token
                onSignedIn();
            } else {
                // Not signed in — show sign-in form
                clerk.mountSignIn(document.getElementById('clerk-signin'), {
                    afterSignInUrl: window.location.href,
                    afterSignUpUrl: window.location.href,
                });

                // Listen for sign-in completion
                clerk.addListener(function(resources) {
                    if (resources.user) {
                        clerk.unmountSignIn(document.getElementById('clerk-signin'));
                        onSignedIn();
                    }
                });
            }
        }

        function onSignedIn() {
            document.getElementById('clerk-signin').style.display = 'none';
            document.getElementById('post-signin').style.display = 'block';
            exchangeToken();
        }

        async function exchangeToken() {
            var statusText = document.getElementById('status-text');
            var errorBox = document.getElementById('error-box');
            var errorText = document.getElementById('error-text');
            var retryBtn = document.getElementById('retry-btn');

            try {
                errorBox.style.display = 'none';
                retryBtn.style.display = 'none';
                statusText.textContent = 'Getting session token...';

                var clerkToken = await window.Clerk.session.getToken();

                statusText.textContent = 'Exchanging for agent token...';

                var response = await fetch(API_URL + '/auth/agent-token', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + clerkToken,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    var errData = {};
                    try { errData = await response.json(); } catch(e) {}
                    throw new Error(errData.detail || response.statusText);
                }

                var data = await response.json();
                statusText.textContent = 'Redirecting to agent...';
                window.location.href = CALLBACK_URL + '?token=' + encodeURIComponent(data.access_token);
            } catch (err) {
                errorBox.style.display = 'block';
                errorText.textContent = 'Authentication failed: ' + err.message;
                retryBtn.style.display = 'block';
                statusText.textContent = 'Failed';
            }
        }
    </script>
</body>
</html>
